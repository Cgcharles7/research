    <meta charset="UTF-8">
    <title>Twitter (Personal)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 30px; background: #0f0f0f; color: #e0e0e0; }
        .container { max-width: 1100px; margin: auto; border: 1px solid #333; padding: 25px; background: #1a1a1a; border-radius: 12px; }
        .file-zone { border: 2px dashed #007bff; padding: 30px; text-align: center; margin-bottom: 20px; border-radius: 8px; background: #121212; cursor: pointer; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
        select, input, button { padding: 12px; border-radius: 4px; border: 1px solid #444; background: #2a2a2a; color: #fff; font-size: 14px; }
        button { background: #007bff; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0056b3; }

        h2 { color: #007bff; margin-top: 0; }
        .legend { display: flex; gap: 15px; margin-top: 5px; }
        .random-sentences { margin-top: 20px;}
        .random-sentence { margin: 5px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px;}
        .randomSentenceContainer{ max-height: 900px; overflow-y: auto;}
    </style>

<script>
    let graph = []; 
    let rawCorpusSentences = []; // Separate storage for raw strings

function gebi(id)
{
	return document.getElementById(id);
}


async function loadVoices() 
{

	{

        }
    }
}

async function handleFiles(files) {
    for (let file of files) {
        const text = await file.text();
        
        if (file.name.endsWith(".json")) {
            try {
                const data = JSON.parse(text);
                const arr = Array.isArray(data) ? data : [data];
                arr.forEach(item => {
                    if (item.text) {
                        processAndGenerateSentences(item.text);
                    }
                });
            } catch(e) { console.error("Training JSON Error", e); }
        } else {
            processAndGenerateSentences(text);
        }
    }
    allNodes = Object.keys(graph);
    updateStats(files.length);
}

function processAndGenerateSentences(text) {
    let sentences = text.split(/(?<=[.!?])\s+/).filter(sentence => sentence.trim() .length > 0);
    graph.push(sentences);
}

function displayRandomSentences() {
    let fl = Math.floor(Math.random() * graph.length);
    let sentences = graph[fl];
    console.log(graph);
    console.log(sentences);
    const randomSentences = [];
    
    for (let i = 0; i < Math.min(25, sentences.length); i++) {
        const randomIndex = Math.floor(Math.random() * sentences.length);
        randomSentences.push(sentences[randomIndex]);
        sentences.splice(randomIndex, 1);
    }
    
    const container = document.getElementById("randomSentencesContainer");
    const divElt = document.createElement("div");
    container.appendChild(divElt);

    container.className = "random-sentences";

    divElt.id = "newDiv" + cntr;
    divElt.className = "random-sentence";
    
    randomSentences.forEach(sentence => {
        const color = '#' + Math.floor(Math.random() * 1677215).toString(16);
        const sentenceElement = document.createElement('div');
        sentenceElement.className = "random-sentence"; 
        sentenceElement.style.color = color;
        sentenceElement.style.margin = "5px 0";
        sentenceElement.innerText = sentence.trim();
        divElt.appendChild(sentenceElement);
    });
    speak();
}

function startAutoLoad() {
    console.log("inside")
        setInterval(() => {
            cntr++;
            displayRandomSentences();
        }, 30000);
    }

// 3. FFWD and BKWD controls that safely bypass native SpeechSynthesis limitations
function ffwd() {
    // Stop whatever is currently being spoken
    synth.cancel();

    // Increment to the next bucket
    cntr++;
    displayRandomSentences();
}

function bkwd() {
    // Don't let them go below the first bucket
    if (cntr <= 0) {
        cntr = 0;
        return;
    }

    // Stop current speech
    synth.cancel();

    // Decrement to the previous bucket
    cntr--;
    displayRandomSentences();
}

function updateStats(fileCount) {
    document.getElementById("fileLabel").innerText = `LOADED: ${fileCount} FILES`;
}

function speak() {


    // 2. Determine the text to be spoken (Original Logic)
    var textToSpeak = document.getElementById("newDiv" + cntr).innerText;

    // 3. Chunking Logic
    // This regex splits by punctuation (. ! ?) but keeps the punctuation with the sentence.
    // It also filters out empty strings.
    var chunks = textToSpeak.match(/[^\.!\?]+[\.!\?]+|[^\.!\?]+/g) || [textToSpeak];


    // 4. Get current settings once to apply to all chunks
    var vol = 1;
    var rate = 1;
    var pitch = 1;
    var selectedOption = gebi("voice").selectedOptions[0].getAttribute('data-name');

    var selectedVoice = voices.find(v => v.name === selectedOption);

    // 5. Queue each chunk
    chunks.forEach((chunkText) => {
        var msg = new SpeechSynthesisUtterance(chunkText.trim());
        
        msg.volume = vol;
        msg.rate = rate;
        msg.pitch = pitch;
        
        if (selectedVoice) {
            msg.voice = selectedVoice;
        }


        // Note: On some mobile browsers, speech only triggers 
        // if the very first chunk is called directly inside a user-click event.
        window.speechSynthesis.speak(msg);
    });
}
