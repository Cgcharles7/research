<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Story Generator with Details</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  h2 { margin-top: 20px; margin-bottom: 5px; }
  .category { margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; }
  .task { margin-left: 10px; }
  .details { margin: 10px 0 15px 25px; padding: 10px; border-left: 2px solid #ccc; display: none; }
  .details input { display: block; margin: 5px 0; width: 95%; }
  textarea { margin-top: 20px; width: 100%; height: 200px; }
</style>
</head>
<body>
<h1>Weekly Story Generator</h1>

<div id="taskChecklist">Loading tasks...</div>

<button onclick="generateWeeklyStory()">Generate Weekly Story</button>

<textarea id="storyTextArea"></textarea>
<script src="work.js"></script>
<script src="chores.js"></script>
  <script>
    

function generateChecklist() {
    const checklistDiv = document.getElementById("taskChecklist");
    checklistDiv.innerHTML = '';

    Object.keys(taskTemplates).forEach(category => {
        const catDiv = document.createElement("div");
        catDiv.classList.add("category");

        const heading = document.createElement("h2");
        heading.textContent = category;
        catDiv.appendChild(heading);

        Object.keys(taskTemplates[category]).forEach(task => {
            const wrapper = document.createElement("div");

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.id = task;
            checkbox.name = task;
            checkbox.value = task;

            const label = document.createElement("label");
            label.htmlFor = task;
            label.appendChild(document.createTextNode(task));
            label.classList.add("task");

            // Details section (hidden until checkbox is selected)
            const detailsDiv = document.createElement("div");
            detailsDiv.classList.add("details");

            const prompts = ["Why did you do this?", "How did you do it?", "What tools did you use?", "What was the result?", "Anything unexpected?"];
            prompts.forEach((prompt, idx) => {
                const input = document.createElement("input");
                input.type = "text";
                input.placeholder = prompt;
                input.dataset.task = task;
                input.dataset.field = `field${idx}`;
                detailsDiv.appendChild(input);
            });

            checkbox.addEventListener('change', () => {
                detailsDiv.style.display = checkbox.checked ? "block" : "none";
            });

            wrapper.appendChild(checkbox);
            wrapper.appendChild(label);
            wrapper.appendChild(detailsDiv);
            catDiv.appendChild(wrapper);
        });

        checklistDiv.appendChild(catDiv);
    });
}

    function fillTemplate(template) {
      const placeholders = template.match(/{\w+}/g);
      if (placeholders) {
        placeholders.forEach(placeholder => {
          const key = placeholder.slice(1, -1);
          const value = prompt(`Enter a value for ${key}:`, "");
          template = template.replace(placeholder, value);
        });
      }
      return template;
    }

function generateWeeklyStory() {
    let story = "This week, I focused on several tasks:\n\n";
    const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');

    checkboxes.forEach((checkbox, index) => {
        let template = null;
        for (const cat in taskTemplates) {
            if (taskTemplates[cat][checkbox.value]) {
                template = taskTemplates[cat][checkbox.value];
                break;
            }
        }
        if (template) {
            let detailsText = "";
            const inputs = document.querySelectorAll(`.details input[data-task="${checkbox.value}"]`);
            inputs.forEach(input => {
                if (input.value.trim() !== "") {
                    detailsText += ` ${input.placeholder}: ${input.value}.`;
                }
            });

            story += `${index + 1}. ${template} ${detailsText}\n`;
        }
    });

    document.getElementById("storyTextArea").value = story;
}

    generateChecklist();
  </script>
</body>
</html>
