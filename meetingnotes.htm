<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meeting Notes + Timer</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 20px auto; }
    h1 { text-align: center; }
    #timer { font-size: 2em; text-align: center; margin: 10px 0; }
    textarea { width: 100%; height: 200px; margin-top: 10px; padding: 10px; }
    button { margin: 5px; padding: 8px 12px; }
  </style>
</head>
<body>
  <h1>Meeting Notes</h1>
  <div id="timer">00:00</div>
  <button onclick="startTimer()">Start</button>
  <button onclick="stopTimer()">Stop</button>
  <button onclick="resetTimer()">Reset</button>
  
  <textarea id="notes" placeholder="Type meeting notes here..."></textarea>
  <button onclick="saveNotes()">💾 Save Notes</button>
  <button onclick="downloadNotes()">⬇️ Download Notes</button>

  <script>
    let seconds = 0, interval;
    const notesArea = document.getElementById("notes");

    function updateTimer() {
      const m = String(Math.floor(seconds / 60)).padStart(2,"0");
      const s = String(seconds % 60).padStart(2,"0");
      document.getElementById("timer").textContent = `${m}:${s}`;
    }

    function startTimer() {
      clearInterval(interval);
      interval = setInterval(() => { seconds++; updateTimer(); }, 1000);
    }
    function stopTimer() { clearInterval(interval); }
    function resetTimer() { clearInterval(interval); seconds = 0; updateTimer(); }

    function saveNotes() {
      localStorage.setItem("meetingNotes", notesArea.value);
      alert("Notes saved!");
    }

    function downloadNotes() {
      const blob = new Blob([notesArea.value], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "meeting-notes.txt";
      a.click();
    }

    notesArea.value = localStorage.getItem("meetingNotes") || "";
    updateTimer();
  </script>
</body>
</html>
